version: '3.8'

services:
  # TimescaleDB for metrics storage
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: servereye-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: servereye
      POSTGRES_USER: servereye_user
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-servereye_password}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servereye_user -d servereye"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: servereye-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - servereye-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  # Backend API (placeholder for future implementation)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servereye-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://servereye_user:${TIMESCALEDB_PASSWORD:-servereye_password}@timescaledb:5432/servereye
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      API_PORT: 8080
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - servereye-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  timescaledb_data:
    driver: local

networks:
  servereye-network:
    driver: bridge