version: '3.8'

services:
  # PostgreSQL for data storage
  postgres:
    image: postgres:16-alpine
    container_name: servereye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: servereye
      POSTGRES_USER: servereye_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servereye_password}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servereye_user -d servereye"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  
  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: servereye-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - servereye-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  # Backend API (placeholder for future implementation)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servereye-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://servereye_user:${POSTGRES_PASSWORD:-servereye_password}@postgres:5432/servereye
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      API_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - servereye-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  servereye-network:
    driver: bridge