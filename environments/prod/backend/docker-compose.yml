# Backend Service for Production
# ASP.NET Core Web API
# Secrets are injected via doppler run -- docker-compose up

services:
  backend:
    image: ghcr.io/godofphonk/servereyeweb/backend:production
    container_name: ServerEyeWeb-backend-prod
    ports:
      - "5246:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Database Connection Strings
      - DATABASE_CONNECTION_STRING
      - TICKET_DB_CONNECTION_STRING
      - BILLING_DB_CONNECTION_STRING
      # Redis Configuration
      - REDIS_CONNECTION_STRING
      # JWT Settings
      - JWT_SECRET_KEY
      # OAuth Settings
      - OAUTH_GOOGLE_CLIENT_ID
      - OAUTH_GOOGLE_CLIENT_SECRET
      - OAUTH_GOOGLE_REDIRECT_URI
      - OAUTH_TELEGRAM_BOT_ID
      - OAUTH_TELEGRAM_BOT_TOKEN
      - OAUTH_TELEGRAM_REDIRECT_URI
      # Stripe Settings
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - STRIPE_PUBLISHABLE_KEY
      # ServerEye API Configuration
      - SERVEREYE_API_URL
      - SERVEREYE_DB_URL
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network
