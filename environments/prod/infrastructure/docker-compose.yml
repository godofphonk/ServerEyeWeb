# Infrastructure Services for Production
# PostgreSQL, Redis with production settings

services:
  # PostgreSQL Main Database (Production)
  postgres-main:
    image: postgres:16-alpine
    container_name: servereye-postgres-main-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres 
      -c ssl=on 
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    volumes:
      - postgres_main_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Ticket Database (Production)
  postgres-ticket:
    image: postgres:16-alpine
    container_name: servereye-postgres-ticket-prod
    environment:
      POSTGRES_DB: ${TICKET_POSTGRES_DATABASE}
      POSTGRES_USER: ${TICKET_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TICKET_POSTGRES_PASSWORD}
    command: >
      postgres 
      -c ssl=on 
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
    volumes:
      - postgres_ticket_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TICKET_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache (Production with password)
  redis:
    image: redis:8-alpine
    container_name: servereye-redis-prod
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - servereye-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: servereye-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../shared/nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ../shared/ssl:/etc/nginx/ssl:ro
      - ../shared/logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - servereye-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  servereye-prod:
    driver: bridge
    name: servereye-prod-network
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  postgres_main_prod_data:
    driver: local
    name: servereye_postgres_main_prod
  postgres_ticket_prod_data:
    driver: local
    name: servereye_postgres_ticket_prod
  redis_prod_data:
    driver: local
    name: servereye_redis_prod
