# Infrastructure Services for Development
# PostgreSQL and Redis

services:
  # PostgreSQL Main Database
  postgres-main:
    image: postgres:16-alpine
    container_name: ServerEyeWeb-postgres-main-dev
    ports:
      - "5433:5432"
    env_file:
      - ../secrets/infrastructure.env
    environment:
      POSTGRES_DB: ServerEyeWeb_Dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c ssl=off
    volumes:
      - postgres_main_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-network

  # PostgreSQL Ticket Database
  postgres-ticket:
    image: postgres:16-alpine
    container_name: ServerEyeWeb-postgres-ticket-dev
    ports:
      - "5434:5432"
    env_file:
      - ../secrets/infrastructure.env
    environment:
      POSTGRES_DB: ServerEyeWeb_Dev_Ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c ssl=off
    volumes:
      - postgres_ticket_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-network

  # PostgreSQL Billing Database
  postgres-billing:
    image: postgres:16-alpine
    container_name: ServerEyeWeb-postgres-billing-dev
    ports:
      - "5436:5432"
    env_file:
      - ../secrets/infrastructure.env
    environment:
      POSTGRES_DB: ServerEyeWeb_Dev_Billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c ssl=off
    volumes:
      - postgres_billing_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-network

  # Redis Cache
  redis:
    image: redis:8-alpine
    container_name: ServerEyeWeb-redis-dev
    ports:
      - "6380:6379"
    env_file:
      - ../secrets/infrastructure.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - servereye-network

  
networks:
  servereye-network:
    external: true
    name: servereye-network

volumes:
  postgres_main_dev_data:
    driver: local
    name: ServerEyeWeb_postgres_main_dev
  postgres_ticket_dev_data:
    driver: local
    name: ServerEyeWeb_postgres_ticket_dev
  postgres_billing_dev_data:
    driver: local
    name: ServerEyeWeb_postgres_billing_dev
