# Backend Service for Development
# ASP.NET Core Web API

services:
  backend:
    build:
      context: ../../../backend/ServerEyeBackend
      dockerfile: ../../environments/dev/dockerfiles/backend-dev.Dockerfile
    container_name: ServerEyeWeb-backend-dev
    ports:
      - "5246:8080"
      - "5247:443"
    env_file:
      - ../secrets/backend.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      # Mount appsettings for hot reload
      - ../../../backend/ServerEyeBackend/ServerEye.API/appsettings.json:/app/appsettings.json:ro
      - ../../../backend/ServerEyeBackend/ServerEye.API/appsettings.Local.json:/app/appsettings.Local.json:ro
    external_links:
      - ServerEyeWeb-redis-dev:redis
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network

