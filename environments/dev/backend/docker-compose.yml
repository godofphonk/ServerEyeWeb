# Backend Service for Development
# ASP.NET Core Web API

services:
  backend:
    build:
      context: ../../../backend/ServerEyeBackend
      dockerfile: ../../environments/dev/dockerfiles/backend-dev.Dockerfile
    container_name: ServerEyeWeb-backend-dev
    ports:
      - "5246:8080"
      - "5247:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - EMAIL_SETTINGS_FRONTEND_URL=${EMAIL_SETTINGS_FRONTEND_URL}
      - GOAPI_SETTINGS_BASE_URL=${GOAPI_SETTINGS_BASE_URL}
      - DATABASE_CONNECTION_STRING=${DATABASE_CONNECTION_STRING}
      - TICKET_DB_CONNECTION_STRING=${TICKET_DB_CONNECTION_STRING}
      - BILLING_DB_CONNECTION_STRING=${BILLING_DB_CONNECTION_STRING}
      - REDIS_CONNECTION_STRING=${REDIS_CONNECTION_STRING}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_GOOGLE_ENABLED=${OAUTH_GOOGLE_ENABLED}
      - OAUTH_GOOGLE_REDIRECT_URI=${OAUTH_GOOGLE_REDIRECT_URI}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
      - OAUTH_GITHUB_ENABLED=${OAUTH_GITHUB_ENABLED}
      - OAUTH_GITHUB_REDIRECT_URI=${OAUTH_GITHUB_REDIRECT_URI}
      - OAUTH_TELEGRAM_BOT_ID=${OAUTH_TELEGRAM_BOT_ID}
      - OAUTH_TELEGRAM_BOT_TOKEN=${OAUTH_TELEGRAM_BOT_TOKEN}
      - OAUTH_TELEGRAM_ENABLED=${OAUTH_TELEGRAM_ENABLED}
      - OAUTH_TELEGRAM_REDIRECT_URI=${OAUTH_TELEGRAM_REDIRECT_URI}
      - EMAIL_SETTINGS_AWS_ACCESS_KEY=${EMAIL_SETTINGS_AWS_ACCESS_KEY}
      - EMAIL_SETTINGS_AWS_SECRET_KEY=${EMAIL_SETTINGS_AWS_SECRET_KEY}
      - EMAIL_SETTINGS_AWS_REGION=${EMAIL_SETTINGS_AWS_REGION}
      - EMAIL_SETTINGS_FROM_EMAIL=${EMAIL_SETTINGS_FROM_EMAIL}
      - EMAIL_SETTINGS_FROM_NAME=${EMAIL_SETTINGS_FROM_NAME}
      - EMAIL_SETTINGS_SUPPORT_EMAIL=${EMAIL_SETTINGS_SUPPORT_EMAIL}
      - EMAIL_SETTINGS_USE_AWS_SES=${EMAIL_SETTINGS_USE_AWS_SES}
      - EMAIL_SETTINGS_ENABLE_SSL=${EMAIL_SETTINGS_ENABLE_SSL}
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network
