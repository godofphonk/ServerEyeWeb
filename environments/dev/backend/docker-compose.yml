# Backend Service for Development
# ASP.NET Core Web API

services:
  backend:
    build:
      context: /home/gospodin/Рабочий стол/homeProjects/ServerEyeProjects/ServerEyeWeb/backend/ServerEyeBackend
      dockerfile: /home/gospodin/Рабочий стол/homeProjects/ServerEyeProjects/ServerEyeWeb/environments/dev/dockerfiles/backend-dev.Dockerfile
    container_name: ServerEyeWeb-backend-dev
    ports:
      - "5246:8080"
      - "5247:443"
    env_file:
      - ../secrets/backend.env
      - ../secrets/shared.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      # Mount appsettings for hot reload
      - /home/gospodin/Рабочий стол/homeProjects/ServerEyeProjects/ServerEyeWeb/backend/ServerEyeBackend/ServerEye.API/appsettings.Development.json:/app/appsettings.json:ro
      - /home/gospodin/Рабочий стол/homeProjects/ServerEyeProjects/ServerEyeWeb/backend/ServerEyeBackend/ServerEye.API/appsettings.Development.json:/app/appsettings.Development.json:ro
      - /home/gospodin/Рабочий стол/homeProjects/ServerEyeProjects/ServerEyeWeb/backend/ServerEyeBackend/ServerEye.API/appsettings.Local.json:/app/appsettings.Local.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - servereye-network
    
networks:
  servereye-network:
    external: true
    name: servereye-network

