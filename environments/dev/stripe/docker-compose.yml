# Stripe CLI Service for Development
# Webhook forwarding service

services:
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: ServerEyeWeb-stripe-cli-dev
    command: listen --forward-to backend:8080/api/webhooks/stripe --events checkout.session.completed,invoice.payment_succeeded,customer.subscription.created
    environment:
      - STRIPE_API_KEY=sk_test_51TAwUfFpa5lei83sxWfCKlW3qvfTrsTKHCu86kDXEeYSohnuww7zZGMmFsolgsOVrggOHWqVSBSkJ3rrguKtz7CY009o2TkIsm
    restart: unless-stopped
    networks:
      - servereye-network
    depends_on:
      - backend
      
networks:
  servereye-network:
    external: true
    name: servereye-network
