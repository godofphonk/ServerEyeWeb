# Frontend Service for Development
# Next.js Application with Hot Reload

services:
  frontend:
    image: test-frontend
    container_name: ServerEyeWeb-frontend-dev
    ports:
      - "3001:3000"
    env_file:
      - ../../secrets/dev/frontend.env
      - ../../secrets/dev/shared.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/styles:/app/styles
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network
