# Frontend Service for Development
# Next.js Application with Hot Reload

services:
  frontend:
    build:
      context: ${PATH_FRONTEND}
      dockerfile: ${PATH_PROJECT}/environments/dev/dockerfiles/frontend-dev.Dockerfile
    container_name: ServerEyeWeb-frontend-dev
    ports:
      - "3000:3000"
    env_file:
      - ../secrets/frontend.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - TURBOPACK=1
      - INTERNAL_API_URL=http://backend:8080/api
    volumes:
      # Mount source code for hot reload
      - ${PATH_FRONTEND}/package.json:/app/package.json
      - ${PATH_FRONTEND}/package-lock.json:/app/package-lock.json
      - ${PATH_FRONTEND}/app:/app/app
      - ${PATH_FRONTEND}/components:/app/components
      - ${PATH_FRONTEND}/lib:/app/lib
      - ${PATH_FRONTEND}/public:/app/public
      - ${PATH_FRONTEND}/styles:/app/styles
      - ${PATH_FRONTEND}/proxy.ts:/app/proxy.ts
      - ${PATH_FRONTEND}/next.config.js:/app/next.config.js
      - ${PATH_FRONTEND}/tailwind.config.js:/app/tailwind.config.js
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network
