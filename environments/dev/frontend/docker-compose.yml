# Frontend Service for Development
# Next.js Application with Hot Reload

services:
  frontend:
    build:
      context: /home/gospodin/ServerEyeWeb/frontend
      dockerfile: /home/gospodin/ServerEyeWeb/environments/dockerfiles/frontend-dev.Dockerfile
    container_name: servereye-frontend-dev
    ports:
      - "3001:3000"
    env_file:
      - ../../secrets/dev/frontend.env
      - ../../secrets/dev/shared.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - /home/gospodin/ServerEyeWeb/frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servereye-network:
    external: true
    name: servereye-network
