# Doppler Configuration Template for ServerEye Backend
# This file defines all secrets needed for the ServerEye backend application

# JWT Configuration
JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_SUPER_SECRET_JWT_KEY_32_CHARS"
JWT_ISSUER: "ServerEye"
JWT_AUDIENCE: "ServerEye-Web"
JWT_ACCESS_TOKEN_EXPIRATION: "01:00:00"
JWT_REFRESH_TOKEN_EXPIRATION: "7.00:00:00"

# Encryption Configuration
ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION_32_CHAR_ENCRYPTION_KEY"

# Database Configuration
DATABASE_CONNECTION_STRING: "CHANGE_ME_IN_PRODUCTION:Host=localhost;Port=5432;Database=ServerEyeWeb;Username=postgres;Password=CHANGE_ME"
TICKET_DB_CONNECTION_STRING: "CHANGE_ME_IN_PRODUCTION:Host=localhost;Port=5434;Database=ServerEyeWeb-ticket;Username=postgres;Password=CHANGE_ME"

# Redis Configuration
REDIS_CONNECTION_STRING: "localhost:6379"

# Email Configuration (AWS SES)
AWS_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION_AWS_ACCESS_KEY"
AWS_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_AWS_SECRET_KEY"
AWS_REGION: "eu-north-1"
SMTP_HOST: "smtp.gmail.com"
SMTP_PORT: "587"
SMTP_USERNAME: "CHANGE_ME_IN_PRODUCTION_EMAIL@gmail.com"
SMTP_PASSWORD: "CHANGE_ME_IN_PRODUCTION_APP_PASSWORD"
FROM_EMAIL: "support@servereye.dev"
FROM_NAME: "ServerEye Support"
SUPPORT_EMAIL: "support@servereye.dev"
FRONTEND_URL: "http://localhost:3000"

# Go API Configuration
GO_API_BASE_URL: "http://ServereyeAPI-api:8080"
GO_API_PRODUCTION_URL: "https://api.servereye.dev"
GO_API_TIMEOUT_SECONDS: "5"

# Security Configuration
REQUIRE_HTTPS: "true"
ENABLE_TOKEN_BLACKLIST: "true"
ENABLE_RATE_LIMITING: "true"
ENABLE_AUDIT_LOGGING: "true"
LOCKOUT_THRESHOLD: "5"
LOCKOUT_DURATION: "00:15:00"

# CORS Configuration
CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:5173"
CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
CORS_ALLOWED_HEADERS: "*"

# Rate Limiting Configuration
RATE_LIMITING_PERMIT_LIMIT: "100"
RATE_LIMITING_WINDOW_SECONDS: "60"
RATE_LIMITING_QUEUE_LIMIT: "10"

# Environment Configuration
ASPNETCORE_ENVIRONMENT: "Development"
ALLOWED_HOSTS: "*"
