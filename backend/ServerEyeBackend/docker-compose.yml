services:
  postgres:
    image: postgres:16-alpine
    container_name: servereyeWeb-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=ServerEyeWeb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - servereye-network

  postgres-ticket:
    image: postgres:16-alpine
    container_name: servereyeWeb-ticket-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=ServerEyeWeb-ticket
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_ticket_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - servereye-network

  redis:
    image: redis:8-alpine
    container_name: servereyeWeb-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - servereye-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servereyeWeb-backend
    ports:
      - "5246:80"
      - "5247:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ServerEyeDbContext=Host=postgres;Port=5432;Database=ServerEyeWeb;Username=postgres;Password=postgres;SslMode=Disable
      - ConnectionStrings__TicketDbContext=Host=postgres-ticket;Port=5432;Database=ServerEyeWeb-ticket;Username=postgres;Password=postgres;SslMode=Disable
      - Redis__ConnectionString=redis:6379
    volumes:
      - ./ServerEye.API/appsettings.Local.json:/app/appsettings.Local.json:ro
    depends_on:
      postgres:
        condition: service_started
      postgres-ticket:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - servereye-network

networks:
  servereye-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_ticket_data:
