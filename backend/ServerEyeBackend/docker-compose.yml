services:
  web-postgres:
    image: postgres:16-alpine
    container_name: servereyeWeb-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=ServerEyeWeb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    command: postgres -c ssl=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-network

  web-postgres-ticket:
    image: postgres:16-alpine
    container_name: servereyeWeb-ticket-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=ServerEyeWeb-ticket
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_ticket_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servereye-network

  web-redis:
    image: redis:8-alpine
    container_name: servereyeWeb-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - servereye-network

  web-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servereyeWeb-backend
    ports:
      - "5246:80"
      - "5247:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_HTTPS_PORTS=443
      # Database connection strings for Docker environment
      - DATABASE_HOST=servereyeWeb-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=ServerEyeWeb
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - TICKET_DB_HOST=servereyeWeb-ticket-postgres
      - TICKET_DB_PORT=5432
      - TICKET_DB_NAME=ServerEyeWeb-ticket
      - TICKET_DB_USER=postgres
      - TICKET_DB_PASSWORD=postgres
      # Redis connection for Docker environment
      - REDIS_HOST=web-redis
      - REDIS_PORT=6379
      # Telegram OAuth configuration
      - TELEGRAM_BOT_ID=8214154743
      # API connection through internal network
      - API_BASE_URL=http://servereye-api:8080
    depends_on:
      web-postgres:
        condition: service_healthy
      web-postgres-ticket:
        condition: service_healthy
      web-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - servereye-network

networks:
  servereye-network:
    external: true
    name: servereye-network

volumes:
  postgres_data:
  postgres_ticket_data:
