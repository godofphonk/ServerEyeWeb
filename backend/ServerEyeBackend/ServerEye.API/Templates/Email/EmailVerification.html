<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #f8f9fa; padding: 30px; border-radius: 10px;">
        <h2 style="color: #007bff; margin-top: 0;">Email Verification</h2>
        <p>Hello <strong>{{UserName}}</strong>,</p>
        <p>Please use the following code to verify your email address:</p>
        <div style="background-color: #ffffff; border: 2px solid #007bff; padding: 20px; text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 8px; margin: 30px 0; border-radius: 8px; color: #007bff;">
            {{VerificationCode}}
        </div>
        <p style="text-align: center; color: #666;">This code will expire in <strong>15 minutes</strong>.</p>
        <p>If you didn't request this verification, please ignore this email.</p>
        <hr style="border: none; border-top: 1px solid #ddd; margin: 30px 0;">
        <p style="color: #666; font-size: 12px; text-align: center;">
            Best regards,<br>
            <strong>ServerEye Team</strong><br>
            <a href="mailto:{{SupportEmail}}" style="color: #007bff;">{{SupportEmail}}</a>
        </p>
    </div>
</body>
</html>
