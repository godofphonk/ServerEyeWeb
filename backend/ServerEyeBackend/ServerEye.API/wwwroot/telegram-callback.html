<!DOCTYPE html>
<html>
<head>
    <title>Telegram OAuth Callback</title>
</head>
<body>
    <h1>Processing Telegram authentication...</h1>
    <script>
        // Parse the fragment to get tgAuthResult
        function parseFragment() {
            const hash = window.location.hash.substring(1); // Remove #
            const params = new URLSearchParams(hash);
            
            const tgAuthResult = params.get('tgAuthResult');
            if (tgAuthResult) {
                try {
                    const userData = JSON.parse(decodeURIComponent(tgAuthResult));
                    
                    // Send data to backend
                    fetch('/api/auth/oauth/telegram/callback', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            userData: userData,
                            state: new URLSearchParams(window.location.search).get('state') || 'telegram_default'
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Check if email verification is required
                            if (data.skipEmailVerification === true) {
                                // OAuth user - skip email verification
                                console.log('OAuth user - skipping email verification');
                                window.location.href = 'http://127.0.0.1:3000/dashboard?auth=success';
                            } else {
                                // Regular user - require email verification
                                console.log('Regular user - redirecting to email verification');
                                window.location.href = 'http://127.0.0.1:3000/verify-email?auth=success';
                            }
                        } else {
                            // Redirect to error page
                            window.location.href = 'http://127.0.0.1:3000/login?auth=error&message=' + encodeURIComponent(data.message || 'Authentication failed');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        window.location.href = 'http://127.0.0.1:3000/login?auth=error&message=Server error';
                    });
                } catch (error) {
                    console.error('Error parsing tgAuthResult:', error);
                    window.location.href = 'http://127.0.0.1:3000/login?auth=error&message=Invalid data';
                }
            } else {
                window.location.href = 'http://127.0.0.1:3000/login?auth=error&message=Missing authentication data';
            }
        }
        
        // Process when page loads
        window.addEventListener('load', parseFragment);
    </script>
</body>
</html>
