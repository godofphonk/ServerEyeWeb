name: "CodeQL Configuration"

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - '**/node_modules'
  - '**/dist'
  - '**/build'
  - '**/*.min.js'
  - '**/obj'
  - '**/bin'
  - '**/.next'
  - '**/coverage'
  - '**/test-results'
  - '**/*.test.ts'
  - '**/*.test.tsx'
  - '**/*.spec.ts'
  - '**/*.spec.tsx'
  - '**/Tests/**'
  - '**/*Tests.cs'

paths:
  - backend/ServerEyeBackend/ServerEye.API
  - backend/ServerEyeBackend/ServerEye.Core
  - backend/ServerEyeBackend/ServerEye.Infrastructure
  - frontend/src
  - frontend/app
  - frontend/components
  - frontend/lib

query-filters:
  - exclude:
      id:
        - js/unused-local-variable
        - js/debugger-statement
