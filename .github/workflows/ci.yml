name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Check for changes
        uses: dorny/paths-filter@v3.0.0
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend-ci.yml'
              - '.github/workflows/ci.yml'

  backend-ci:
    name: Backend CI
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      checks: write
      security-events: write

  frontend-ci:
    name: Frontend CI
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      checks: write
      security-events: write


  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [detect-changes, backend-ci, frontend-ci]
    
    steps:
      - name: Check all jobs
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.detect-changes.outputs.backend }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.detect-changes.outputs.frontend }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend CI | ${{ needs.backend-ci.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI | ${{ needs.frontend-ci.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: |
          (needs.detect-changes.outputs.backend == 'true' && needs.backend-ci.result == 'failure') ||
          (needs.detect-changes.outputs.frontend == 'true' && needs.frontend-ci.result == 'failure')
        run: |
          echo "❌ One or more CI checks failed"
          exit 1

      - name: Success message
        if: |
          (needs.detect-changes.outputs.backend != 'true' || needs.backend-ci.result == 'success') &&
          (needs.detect-changes.outputs.frontend != 'true' || needs.frontend-ci.result == 'success')
        run: |
          echo "✅ All CI checks passed successfully!"
