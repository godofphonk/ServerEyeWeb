name: Deploy to Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./environments/prod/dockerfiles/backend-prod.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:production
            ${{ env.IMAGE_BACKEND }}:production-${{ github.sha }}
          no-cache: true
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=ServerEyeWeb Backend
            org.opencontainers.image.version=production

      - name: Install Doppler CLI for frontend build
        uses: dopplerhq/cli-action@v4
        with:
          version: latest

      - name: Prepare frontend build args from Doppler
        id: frontend-args
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_FRONTEND }}
        run: |
          set -Eeuo pipefail

          tmp_json="$(mktemp)"
          doppler secrets download \
            --no-file \
            --project servereye \
            --config prd_frontend \
            --format json > "$tmp_json"

          secrets_hash="$(sha256sum "$tmp_json" | cut -d' ' -f1)"

          {
            echo "build_args<<EOF"
            jq -r 'to_entries[] | select(.key | startswith("NEXT_PUBLIC_")) | "\(.key)=\(.value)"' "$tmp_json"
            echo "EOF"
            echo "secrets_hash=$secrets_hash"
          } >> "$GITHUB_OUTPUT"

          rm -f "$tmp_json"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./environments/prod/dockerfiles/frontend-prod.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:production
            ${{ env.IMAGE_FRONTEND }}:production-${{ github.sha }}
          build-args: |
            ${{ steps.frontend-args.outputs.build_args }}
            SECRETS_HASH=${{ steps.frontend-args.outputs.secrets_hash }}
          no-cache: true
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=ServerEyeWeb Frontend
            org.opencontainers.image.version=production

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    if: github.ref == 'refs/heads/production'
    environment:
      name: production
      url: https://servereye.dev

    steps:
      - name: Deploy stacks on VPS
        uses: appleboy/ssh-action@v1
        env:
          REMOTE_GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          REMOTE_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DOPPLER_TOKEN_BACKEND: ${{ secrets.DOPPLER_TOKEN_BACKEND }}
          DOPPLER_TOKEN_FRONTEND: ${{ secrets.DOPPLER_TOKEN_FRONTEND }}
          DOPPLER_TOKEN_INFRASTRUCTURE: ${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          REPO_REF: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}
          IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: REMOTE_GHCR_USERNAME,REMOTE_GHCR_TOKEN,DOPPLER_TOKEN_BACKEND,DOPPLER_TOKEN_FRONTEND,DOPPLER_TOKEN_INFRASTRUCTURE,REPO_URL,REPO_REF,DEPLOY_SHA,IMAGE_BACKEND,IMAGE_FRONTEND
          script: |
            set -Eeuo pipefail

            APP_DIR="/opt/servereye"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            echo "==> Validating prerequisites"
            command -v git >/dev/null 2>&1 || { echo "git is required"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is required"; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "docker compose v2 is required"; exit 1; }
            command -v doppler >/dev/null 2>&1 || { echo "doppler CLI is required on VPS for infrastructure/frontend"; exit 1; }

            echo "==> Preparing application directory"
            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$REPO_REF" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout "$REPO_REF"
            git reset --hard "origin/$REPO_REF"

            echo "==> Verifying compose files"
            test -f environments/prod/backend/docker-compose.yml
            test -f environments/prod/infrastructure/docker-compose.yml
            test -f environments/prod/frontend/docker-compose.yml
            test -f environments/prod/observability/docker-compose.yml

            echo "==> Saving rollback information"
            BACKEND_CID="$(docker compose -f environments/prod/backend/docker-compose.yml ps -q backend 2>/dev/null || true)"
            FRONTEND_CID="$(docker compose -f environments/prod/frontend/docker-compose.yml ps -q frontend 2>/dev/null || true)"

            PREV_BACKEND_IMAGE_ID=""
            PREV_FRONTEND_IMAGE_ID=""

            if [ -n "$BACKEND_CID" ]; then
              PREV_BACKEND_IMAGE_ID="$(docker inspect -f '{{.Image}}' "$BACKEND_CID")"
            fi

            if [ -n "$FRONTEND_CID" ]; then
              PREV_FRONTEND_IMAGE_ID="$(docker inspect -f '{{.Image}}' "$FRONTEND_CID")"
            fi

            cat > "$APP_DIR/deployment-info.env" <<EOF
            PREV_BACKEND_IMAGE_ID=$PREV_BACKEND_IMAGE_ID
            PREV_FRONTEND_IMAGE_ID=$PREV_FRONTEND_IMAGE_ID
            PREV_DEPLOY_SHA=$DEPLOY_SHA
            EOF

            echo "==> Logging in to GHCR"
            echo "$REMOTE_GHCR_TOKEN" | docker login ghcr.io -u "$REMOTE_GHCR_USERNAME" --password-stdin

            echo "==> Pulling exact images for this commit"
            docker pull "$IMAGE_BACKEND:production-$DEPLOY_SHA"
            docker pull "$IMAGE_FRONTEND:production-$DEPLOY_SHA"

            echo "==> Tagging pulled images as production locally"
            docker tag "$IMAGE_BACKEND:production-$DEPLOY_SHA" "$IMAGE_BACKEND:production"
            docker tag "$IMAGE_FRONTEND:production-$DEPLOY_SHA" "$IMAGE_FRONTEND:production"

            echo "==> Starting infrastructure"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereye --config prd_infrastructure -- \
            docker compose -f environments/prod/infrastructure/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Starting observability"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereye --config prd_infrastructure -- \
            docker compose -f environments/prod/observability/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Starting backend"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_BACKEND" \
            docker compose -f environments/prod/backend/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Starting frontend"
            DOPPLER_TOKEN="$DOPPLER_TOKEN_FRONTEND" \
            doppler run --project servereye --config prd_frontend -- \
            docker compose -f environments/prod/frontend/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "==> Configuring nginx"
            if ! command -v nginx >/dev/null 2>&1; then
              $SUDO apt-get update
              $SUDO apt-get install -y nginx
              $SUDO systemctl enable nginx
            fi

            $SUDO mkdir -p /etc/nginx/ssl
            $SUDO cp "$APP_DIR/environments/prod/nginx/servereye.dev.conf" /etc/nginx/sites-available/servereye.dev.conf

            if [ ! -L /etc/nginx/sites-enabled/servereye.dev.conf ]; then
              $SUDO ln -s /etc/nginx/sites-available/servereye.dev.conf /etc/nginx/sites-enabled/servereye.dev.conf
            fi

            $SUDO rm -f /etc/nginx/sites-enabled/default
            $SUDO nginx -t
            $SUDO systemctl reload nginx

            echo "==> Verifying running containers"
            docker compose -f environments/prod/backend/docker-compose.yml ps
            docker compose -f environments/prod/frontend/docker-compose.yml ps
            docker compose -f environments/prod/infrastructure/docker-compose.yml ps
            docker compose -f environments/prod/observability/docker-compose.yml ps

            echo "==> Backend health check"
            backend_ok=false
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://127.0.0.1:5246/health >/dev/null; then
                backend_ok=true
                break
              fi
              sleep $((i * 5))
            done

            if [ "$backend_ok" != "true" ]; then
              echo "Backend health check failed"
              docker compose -f environments/prod/backend/docker-compose.yml logs --tail=200 || true
              exit 1
            fi

            echo "==> Frontend health check"
            frontend_ok=false
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://127.0.0.1:5247 >/dev/null; then
                frontend_ok=true
                break
              fi
              sleep $((i * 5))
            done

            if [ "$frontend_ok" != "true" ]; then
              echo "Frontend health check failed"
              docker compose -f environments/prod/frontend/docker-compose.yml logs --tail=200 || true
              exit 1
            fi

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "✅ Deployment successful"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        env:
          DOPPLER_TOKEN_BACKEND: ${{ secrets.DOPPLER_TOKEN_BACKEND }}
          DOPPLER_TOKEN_FRONTEND: ${{ secrets.DOPPLER_TOKEN_FRONTEND }}
          DOPPLER_TOKEN_INFRASTRUCTURE: ${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }}
          IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}
          IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          envs: DOPPLER_TOKEN_BACKEND,DOPPLER_TOKEN_FRONTEND,DOPPLER_TOKEN_INFRASTRUCTURE,IMAGE_BACKEND,IMAGE_FRONTEND
          script: |
            set -Eeuo pipefail

            APP_DIR="/opt/servereye"

            if [ ! -f "$APP_DIR/deployment-info.env" ]; then
              echo "No rollback metadata found"
              exit 1
            fi

            cd "$APP_DIR"
            source "$APP_DIR/deployment-info.env"

            echo "==> Rolling back"

            if [ -n "${PREV_BACKEND_IMAGE_ID:-}" ]; then
              docker tag "$PREV_BACKEND_IMAGE_ID" "$IMAGE_BACKEND:production"
            fi

            if [ -n "${PREV_FRONTEND_IMAGE_ID:-}" ]; then
              docker tag "$PREV_FRONTEND_IMAGE_ID" "$IMAGE_FRONTEND:production"
            fi

            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereye --config prd_infrastructure -- \
            docker compose -f environments/prod/infrastructure/docker-compose.yml up -d --force-recreate --remove-orphans

            DOPPLER_TOKEN="$DOPPLER_TOKEN_INFRASTRUCTURE" \
            doppler run --project servereye --config prd_infrastructure -- \
            docker compose -f environments/prod/observability/docker-compose.yml up -d --force-recreate --remove-orphans

            DOPPLER_TOKEN="$DOPPLER_TOKEN_BACKEND" \
            docker compose -f environments/prod/backend/docker-compose.yml up -d --force-recreate --remove-orphans

            DOPPLER_TOKEN="$DOPPLER_TOKEN_FRONTEND" \
            doppler run --project servereye --config prd_frontend -- \
            docker compose -f environments/prod/frontend/docker-compose.yml up -d --force-recreate --remove-orphans

            echo "✅ Rollback finished"