name: Deploy to Production

on:
  pull_request:
    branches:
      - production
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend
  DOTNET_VERSION: '10.0.0'

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87b1b1e3e833a9e799cfd976b17d2eb0f02c # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b296d8e7e8e8a3b3e3e3e3e3e3e3e3e3e3e3 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        shell: bash
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if docker buildx build \
              --file ./environments/prod/dockerfiles/backend-prod.Dockerfile \
              --iidfile /tmp/backend-iidfile \
              --tag ${{ env.IMAGE_BACKEND }}:production \
              --tag ${{ env.IMAGE_BACKEND }}:production-${{ github.sha }} \
              --label org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --label org.opencontainers.image.revision=${{ github.sha }} \
              --label org.opencontainers.image.source=https://github.com/${{ github.repository }} \
              --label org.opencontainers.image.title=ServerEyeWeb \
              --label org.opencontainers.image.version=production \
              --no-cache \
              --push \
              .; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            else
              echo "Build failed on attempt $attempt"
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
                attempt=$((attempt + 1))
              else
                echo "Max attempts reached, giving up"
                exit 1
              fi
            fi
          done

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4
        with:
          version: latest

      - name: Build and push frontend image
        shell: bash
        run: |
          export PATH="$PATH:/home/runner/work/ServerEyeWeb/ServerEyeWeb/bin"
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            # Get all NEXT_PUBLIC_* secrets from Doppler dynamically
            export DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_FRONTEND }}
            
            # Download secrets as JSON and extract NEXT_PUBLIC_* variables
            SECRETS_JSON=$(doppler secrets download --no-file --format json --project servereye --config prd_frontend 2>/dev/null || echo '{}')
            
            # Build build-args string from NEXT_PUBLIC_* variables
            BUILD_ARGS=""
            if [ -n "$SECRETS_JSON" ] && [ "$SECRETS_JSON" != "{}" ]; then
              BUILD_ARGS=$(echo "$SECRETS_JSON" | jq -r 'to_entries[] | select(.key | startswith("NEXT_PUBLIC_")) | "--build-arg \(.key)=\(.value)"' | tr '\n' ' ')
            fi
            
            # Fallback to manual extraction if jq fails
            if [ -z "$BUILD_ARGS" ]; then
              echo "Falling back to manual secret extraction"
              NEXT_PUBLIC_API_URL=$(doppler secrets get NEXT_PUBLIC_API_URL --project servereye --config prd_frontend --plain 2>/dev/null || echo "")
              NEXT_PUBLIC_WS_URL=$(doppler secrets get NEXT_PUBLIC_WS_URL --project servereye --config prd_frontend --plain 2>/dev/null || echo "")
              NEXT_PUBLIC_COOKIE_DOMAIN=$(doppler secrets get NEXT_PUBLIC_COOKIE_DOMAIN --project servereye --config prd_frontend --plain 2>/dev/null || echo "")
              
              BUILD_ARGS=""
              [ -n "$NEXT_PUBLIC_API_URL" ] && BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
              [ -n "$NEXT_PUBLIC_WS_URL" ] && BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL"
              [ -n "$NEXT_PUBLIC_COOKIE_DOMAIN" ] && BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_COOKIE_DOMAIN=$NEXT_PUBLIC_COOKIE_DOMAIN"
            fi
            
            echo "Build args: $BUILD_ARGS"
            
            # Generate cache key based on secrets hash to invalidate cache when secrets change
            SECRETS_HASH=$(echo "$SECRETS_JSON" | md5sum | cut -d' ' -f1)
            CACHE_FROM=type=gha,mode=max,ref=ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:buildcache
            CACHE_TO=type=gha,mode=max,ref=ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:buildcache,ignore-error=true
            
            # Build with secrets as build-args and cache invalidation
            if docker buildx build \
              --file ./environments/prod/dockerfiles/frontend-prod.Dockerfile \
              $BUILD_ARGS \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              --build-arg SECRETS_HASH=$SECRETS_HASH \
              --cache-from $CACHE_FROM \
              --cache-to $CACHE_TO \
              --iidfile /tmp/frontend-iidfile \
              --tag ${{ env.IMAGE_FRONTEND }}:production \
              --tag ${{ env.IMAGE_FRONTEND }}:production-${{ github.sha }} \
              --label org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --label org.opencontainers.image.revision=${{ github.sha }} \
              --label org.opencontainers.image.source=https://github.com/${{ github.repository }} \
              --label org.opencontainers.image.title=ServerEyeWeb \
              --label org.opencontainers.image.version=production \
              --push \
              ./frontend; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            else
              echo "Build failed on attempt $attempt"
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
                attempt=$((attempt + 1))
              else
                echo "Max attempts reached, giving up"
                exit 1
              fi
            fi
          done

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push
    environment:
      name: production
      url: https://servereye.dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Setup git repository on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Check if git is installed
            if ! command -v git &> /dev/null; then
              echo "❌ Git is not installed on VPS"
              exit 1
            fi
            echo "✅ Git is installed: $(git --version)"
            
            # Create deployment directory
            mkdir -p /opt/servereye
            
            # Setup git repository if not exists
            if [ ! -d /opt/servereye/.git ]; then
              cd /opt/servereye
              echo "Cloning repository with branch: ${{ github.ref_name }}"
              git clone --branch ${{ github.ref_name }} ${{ github.server_url }}/${{ github.repository }}.git .
              echo "✅ Repository cloned successfully"
            else
              echo "✅ Repository already exists, will pull latest changes"
            fi

      - name: Pull latest changes from git
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            echo "✅ Latest changes pulled successfully"

      - name: Verify git repository structure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            echo "Current directory structure:"
            ls -la
            echo ""
            echo "Checking environments directory:"
            if [ -d environments ]; then
              ls -la environments
              if [ -d environments/prod ]; then
                ls -la environments/prod
              else
                echo "❌ environments/prod directory does not exist"
              fi
            else
              echo "❌ environments directory does not exist"
            fi

      - name: Verify docker-compose files exist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            ls -la environments/prod/backend/docker-compose.yml
            ls -la environments/prod/infrastructure/docker-compose.yml
            ls -la environments/prod/frontend/docker-compose.yml

      - name: Login to GitHub Container Registry
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Save current running images before deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            # Get current running images
            CURRENT_BACKEND=$(docker ps --filter "name=backend" --format "{{.Image}}")
            CURRENT_FRONTEND=$(docker ps --filter "name=frontend" --format "{{.Image}}")
            
            # Save current deployment info
            echo "CURRENT_BACKEND=$CURRENT_BACKEND" > /opt/servereye/deployment-info.txt
            echo "CURRENT_FRONTEND=$CURRENT_FRONTEND" >> /opt/servereye/deployment-info.txt
            echo "CURRENT_COMMIT_SHA=${{ github.sha }}" >> /opt/servereye/deployment-info.txt
            echo "DEPLOYMENT_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> /opt/servereye/deployment-info.txt
            
            # Tag current images as production-previous if they exist
            if [ -n "$CURRENT_BACKEND" ]; then
              docker tag $CURRENT_BACKEND ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-previous || true
            fi
            if [ -n "$CURRENT_FRONTEND" ]; then
              docker tag $CURRENT_FRONTEND ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-previous || true
            fi
            
            echo "Current deployment info saved"

      - name: Pull latest images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }}

      - name: Verify images pulled
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Verifying images pulled..."
            docker images | grep servereyeweb/backend
            docker images | grep servereyeweb/frontend

      - name: Tag images as latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production

      - name: Stop existing containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker-compose -f environments/prod/backend/docker-compose.yml down
            docker-compose -f environments/prod/infrastructure/docker-compose.yml down

      - name: Remove old images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }} || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }} || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production || true

      - name: Pull new images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }}
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production

      - name: Start infrastructure containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }} doppler run --project servereye --config prd_infrastructure -- docker-compose -f environments/prod/infrastructure/docker-compose.yml up -d --force-recreate

      - name: Verify infrastructure containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Verifying infrastructure containers..."
            docker ps | grep postgres
            docker ps | grep redis

      - name: Start observability stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker-compose -f environments/prod/observability/docker-compose.yml up -d --force-recreate

      - name: Start backend containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            # Inject secrets using doppler run
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_BACKEND }} doppler run --project servereye --config prd_backend -- docker-compose -f environments/prod/backend/docker-compose.yml up -d --force-recreate

      - name: Start frontend containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_FRONTEND }} doppler run --project servereye --config prd_frontend -- docker-compose -f environments/prod/frontend/docker-compose.yml up -d --force-recreate

      - name: Setup nginx and configuration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Install nginx if not installed
            if ! command -v nginx &> /dev/null; then
              apt-get update
              apt-get install -y nginx
              systemctl enable nginx
            fi

            # Create nginx ssl directory
            mkdir -p /etc/nginx/ssl

            # Always copy nginx configuration (ensures latest changes are applied)
            cp /opt/servereye/environments/prod/nginx/servereye.dev.conf /etc/nginx/sites-available/

            # Create symlink if not exists
            if [ ! -L /etc/nginx/sites-enabled/servereye.dev.conf ]; then
              ln -s /etc/nginx/sites-available/servereye.dev.conf /etc/nginx/sites-enabled/
            fi

            # Remove default nginx site
            rm -f /etc/nginx/sites-enabled/default

            # Test nginx configuration before reload
            nginx -t

            # Reload nginx (zero-downtime) - applies new configuration
            systemctl reload nginx

            echo "✅ Nginx configuration updated and reloaded successfully"

      - name: Verify all containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Verifying backend containers..."
            docker ps | grep backend
            docker ps | grep frontend
            echo "Verifying deployment..."
            docker ps --filter "name=backend" --format "{{.Image}}"
            docker ps --filter "name=frontend" --format "{{.Image}}"

      - name: Cleanup old images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/servereye
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Waiting for services to start..."
            sleep 30
            
            # Check backend health on port 5246
            if curl -f http://localhost:5246/health; then
              echo "✅ Backend health check passed"
            else
              echo "❌ Backend health check failed"
              exit 1
            fi
            
            # Check frontend health on port 5247
            if curl -f http://localhost:5247; then
              echo "✅ Frontend health check passed"
            else
              echo "❌ Frontend health check failed"
              exit 1
            fi
            
            echo "✅ Deployment successful!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "❌ Deployment failed, initiating rollback..."
            cd /opt/servereye
            
            # Load previous deployment info
            if [ -f /opt/servereye/deployment-info.txt ]; then
              source /opt/servereye/deployment-info.txt
              echo "Rolling back to previous deployment:"
              echo "Previous backend: $CURRENT_BACKEND"
              echo "Previous frontend: $CURRENT_FRONTEND"
              echo "Previous commit: $CURRENT_COMMIT_SHA"
              
              # Stop current containers
              docker-compose -f environments/prod/backend/docker-compose.yml down
              docker-compose -f environments/prod/infrastructure/docker-compose.yml down
              docker-compose -f environments/prod/frontend/docker-compose.yml down
              docker-compose -f environments/prod/observability/docker-compose.yml down
              
              # Rollback to previous images
              if [ -n "$CURRENT_BACKEND" ]; then
                docker tag $CURRENT_BACKEND ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production || true
              fi
              if [ -n "$CURRENT_FRONTEND" ]; then
                docker tag $CURRENT_FRONTEND ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production || true
              fi
              
              # Start containers with previous images
              # Inject secrets using doppler run
              DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_INFRASTRUCTURE }} doppler run --project servereye --config prd_infrastructure -- docker-compose -f environments/prod/infrastructure/docker-compose.yml up -d
              docker-compose -f environments/prod/observability/docker-compose.yml up -d
              DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_BACKEND }} doppler run --project servereye --config prd_backend -- docker-compose -f environments/prod/backend/docker-compose.yml up -d
              DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_FRONTEND }} doppler run --project servereye --config prd_frontend -- docker-compose -f environments/prod/frontend/docker-compose.yml up -d
              
              echo "✅ Rollback completed successfully"
            else
              echo "⚠️ No previous deployment info found, stopping containers only"
              docker-compose -f environments/prod/backend/docker-compose.yml down
              docker-compose -f environments/prod/infrastructure/docker-compose.yml down
              docker-compose -f environments/prod/frontend/docker-compose.yml down
              docker-compose -f environments/prod/observability/docker-compose.yml down
            fi
