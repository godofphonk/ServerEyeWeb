name: Deploy to Production

on:
  pull_request:
    branches:
      - production
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend
  DOTNET_VERSION: '10.0.105'

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        shell: bash
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if docker buildx build \
              --file ./environments/prod/dockerfiles/backend-prod.Dockerfile \
              --iidfile /tmp/backend-iidfile \
              --tag ${{ env.IMAGE_BACKEND }}:production \
              --tag ${{ env.IMAGE_BACKEND }}:production-${{ github.sha }} \
              --label org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --label org.opencontainers.image.revision=${{ github.sha }} \
              --label org.opencontainers.image.source=https://github.com/${{ github.repository }} \
              --label org.opencontainers.image.title=ServerEyeWeb \
              --label org.opencontainers.image.version=production \
              --no-cache \
              --push \
              .; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            else
              echo "Build failed on attempt $attempt"
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
                attempt=$((attempt + 1))
              else
                echo "Max attempts reached, giving up"
                exit 1
              fi
            fi
          done

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        shell: bash
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts"
            if docker buildx build \
              --file ./environments/prod/dockerfiles/frontend-prod.Dockerfile \
              --iidfile /tmp/frontend-iidfile \
              --tag ${{ env.IMAGE_FRONTEND }}:production \
              --tag ${{ env.IMAGE_FRONTEND }}:production-${{ github.sha }} \
              --label org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --label org.opencontainers.image.revision=${{ github.sha }} \
              --label org.opencontainers.image.source=https://github.com/${{ github.repository }} \
              --label org.opencontainers.image.title=ServerEyeWeb \
              --label org.opencontainers.image.version=production \
              --no-cache \
              --push \
              ./frontend; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            else
              echo "Build failed on attempt $attempt"
              if [ $attempt -lt $max_attempts ]; then
                echo "Retrying in 30 seconds..."
                sleep 30
                attempt=$((attempt + 1))
              else
                echo "Max attempts reached, giving up"
                exit 1
              fi
            fi
          done

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push
    environment:
      name: production
      url: https://servereye.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/servereye/infrastructure"

      - name: Copy docker-compose files
        run: |
          scp environments/prod/backend/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/servereye/
          scp environments/prod/infrastructure/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/servereye/infrastructure/

      - name: Verify files copied
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            ls -la /opt/servereye/docker-compose.yml
            ls -la /opt/servereye/infrastructure/docker-compose.yml
          ENDSSH

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd /opt/servereye
            
            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images with SHA tags for uniqueness
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }}

            # Verify images pulled
            echo "Verifying images pulled..."
            docker images | grep servereyeweb/backend
            docker images | grep servereyeweb/frontend
            
            # Tag as latest for docker-compose
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production
            docker tag ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }} ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production
            
            # Stop existing containers
            docker-compose -f docker-compose.yml down
            docker-compose -f infrastructure/docker-compose.yml down
            
            # Remove old images to force fresh start
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production-${{ github.sha }} || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production-${{ github.sha }} || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production || true
            docker rmi ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production || true
            
            # Pull new images to ensure latest version
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/backend:production
            docker pull ghcr.io/${{ github.repository_owner }}/servereyeweb/frontend:production || true
            
            # Start infrastructure containers
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} doppler run --project servereye --config prd -- docker-compose -f infrastructure/docker-compose.yml up -d --force-recreate

            # Verify infrastructure containers running
            echo "Verifying infrastructure containers..."
            docker ps | grep postgres
            docker ps | grep redis

            # Start backend containers with DOPPLER_TOKEN
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} docker-compose -f docker-compose.yml up -d --force-recreate
            
            # Start frontend containers
            docker-compose -f frontend/docker-compose.yml up -d --force-recreate
            
            # Verify backend containers running
            echo "Verifying backend containers..."
            docker ps | grep backend
            docker ps | grep frontend
            
            # Verify all containers are running with new images
            echo "Verifying deployment..."
            docker ps --filter "name=backend" --format "{{.Image}}"
            docker ps --filter "name=frontend" --format "{{.Image}}"
            
            # Cleanup old images
            docker image prune -f
          ENDSSH

      # Health check disabled temporarily
      # - name: Health check
      #   run: |
      #     echo "Waiting for services to start..."
      #     sleep 30
      #     
      #     # Check backend health via VPS IP
      #     ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "curl -f http://localhost:8080/health" || exit 1
      #     
      #     echo "✅ Deployment successful!"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, initiating rollback..."
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd /opt/servereye
            docker-compose -f docker-compose.yml down
            # You could implement more sophisticated rollback logic here
          ENDSSH
