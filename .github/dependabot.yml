version: 2
updates:
  # Backend dependencies
  - package-ecosystem: "nuget"
    directory: "/backend/ServerEyeBackend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "godofphonk"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "godofphonk"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]
      # Игнорировать ESLint 10.x пока не готова миграция (требует Node.js 20+)
      - dependency-name: "eslint"
        versions: ["10.x"]
      - dependency-name: "@eslint/js"
        versions: ["10.x"]
      # Игнорировать Next.js 16.x пока не обновлен Node.js до 20+
      - dependency-name: "next"
        versions: ["16.x"]
      # Игнорировать major обновления TypeScript для стабильности
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "godofphonk"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

